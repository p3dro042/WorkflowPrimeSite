<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Product Page</title>
    <style>
        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Product Container Layout */
        .product-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        /* Left Side: Media Display */
        .product-image-box {
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .product-image-box img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        /* Right Side: Product Details */
        .product-details {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-name {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 2rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        /* Pricing Block */
        .price-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-price {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e63946;
        }

        .original-price {
            font-size: 1.1rem;
            color: #aaa;
            text-decoration: line-line-through;
            text-decoration: line-through;
        }

        .product-description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 24px;
        }

        /* Variant Selectors */
        .selector-group {
            margin-bottom: 20px;
        }

        .selector-label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #444;
        }

        .options-wrapper {
            display: flex;
            gap: 10px;
        }

        .size-btn {
            border: 1px solid #ddd;
            background: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .size-btn:hover {
            border-color: #111;
        }

        .size-btn.active {
            background-color: #111;
            color: white;
            border-color: #111;
        }

        /* CTA Actions */
        .action-button {
            width: 100%;
            background-color: #111;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            text-align: center;
        }

        .action-button:hover {
            background-color: #333;
        }

        /* Responsive Breakpoint for Mobile Layout */
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
            .product-image-box {
                padding: 20px;
            }
            .product-details {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Semantic Container -->
    <main class="product-container">
        
        <!-- Showcase Image Section -->
        <section class="product-image-box">
            <!-- Replace placeholder source with your product asset path -->
            <img src="https://placeholder.com" alt="Premium Wireless Headphones Close-up View">
        </section>

        <!-- Context & Buying Section -->
        <section class="product-details">
            <span class="brand-name">AeroAudio</span>
            <h1 class="product-title">Studio Pro Wireless Headphones</h1>
            
            <div class="price-container">
                <span class="current-price">$149.00</span>
                <span class="original-price">$199.00</span>
            </div>

            <p class="product-description">
                Experience high-fidelity sound engineering with active noise cancellation, a 40-hour prolonged battery cell capacity, and deep spatial acoustic output configurations tailored for daily travel.
            </p>

            <!-- Example Variant Selection Strategy -->
            <div class="selector-group">
                <span class="selector-label">Select Color Option</span>
                <div class="options-wrapper">
                    <button class="size-btn active">Matte Black</button>
                    <button class="size-btn">Silver Gray</button>
                </div>
            </div>

            <!-- Main Conversion Event -->
            <button class="action-button" type="button">Add to Shopping Cart</button>
        </section>

    </main>

</body>
</html>
