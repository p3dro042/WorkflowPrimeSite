<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Grid Page</title>
    <style>
        /* Reset margins and remove scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* Create the grid overlay using linear-gradients */
        .grid-background {
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, #e0e0e0 1px, transparent 1px),
                linear-gradient(to bottom, #e0e0e0 1px, transparent 1px);
            /* Defines the size of each grid square (40px by 40px) */
            background-size: 40px 40px; 
        }
    </style>
</head>
<body>

    <!-- Full screen grid container -->
    <div class="grid-background"></div>

</body>
</html>
